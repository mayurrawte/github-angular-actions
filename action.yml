name: 'Angular Setup'
description: 'One-step Angular CI setup: installs Angular CLI, configures Node.js, and caches npm, yarn, or pnpm.'
author: 'Mayur Rawte'
branding:
  icon: 'zap'
  color: 'red'

inputs:
  version:
    description: 'Angular CLI version to install (e.g. 17.3.8, 18.0.0, or latest)'
    required: false
    default: 'latest'
  node-version:
    description: 'Node.js version to use (e.g. 22, 20, 18)'
    required: false
    default: '22'
  package-manager:
    description: 'Package manager to cache and use for the global CLI install: npm, yarn, or pnpm'
    required: false
    default: 'npm'
  cache-dependency-path:
    description: 'Path to the lock file for caching (e.g. packages/app/package-lock.json). Defaults to repo root.'
    required: false
    default: ''
  cache:
    description: 'Enable package manager caching. Set to false to disable (e.g. if no lock file exists).'
    required: false
    default: 'true'

outputs:
  cli-version:
    description: 'The installed Angular CLI version string (e.g. 17.3.8)'
    value: ${{ steps.get-version.outputs.cli-version }}

runs:
  using: composite
  steps:
    - name: Setup pnpm
      if: ${{ inputs.package-manager == 'pnpm' }}
      uses: pnpm/action-setup@v4
      with:
        version: latest

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: ${{ inputs.cache == 'true' && inputs.package-manager || '' }}
        cache-dependency-path: ${{ inputs.cache-dependency-path }}

    - name: Install Angular CLI (npm)
      if: ${{ inputs.package-manager == 'npm' || inputs.package-manager == '' }}
      shell: bash
      run: |
        npm install -g @angular/cli@${{ inputs.version }}
        echo "$(npm prefix -g)/bin" >> "$GITHUB_PATH"

    - name: Install Angular CLI (pnpm)
      if: ${{ inputs.package-manager == 'pnpm' }}
      shell: bash
      run: |
        # Put global bins in PNPM_HOME (already on PATH from pnpm/action-setup)
        pnpm config set global-bin-dir "$PNPM_HOME"
        pnpm add -g @angular/cli@${{ inputs.version }}

    - name: Install Angular CLI (yarn)
      if: ${{ inputs.package-manager == 'yarn' }}
      shell: bash
      run: |
        yarn global add @angular/cli@${{ inputs.version }}
        echo "$(yarn global bin)" >> "$GITHUB_PATH"

    - name: Get Angular CLI version
      id: get-version
      shell: bash
      env:
        INPUT_PM: ${{ inputs.package-manager }}
      run: |
        if [ "$INPUT_PM" = "pnpm" ]; then
          # pnpm list -g --json is reliable regardless of store location
          CLI_VERSION=$(pnpm list -g @angular/cli --json 2>/dev/null | node -e \
            "let b='';process.stdin.on('data',c=>b+=c);process.stdin.on('end',()=>{try{const a=JSON.parse(b);const i=Array.isArray(a)?a[0]:a;process.stdout.write(i?.dependencies?.['@angular/cli']?.version||'unknown')}catch(e){process.stdout.write('unknown')}})" \
            2>/dev/null || echo "unknown")
        elif [ "$INPUT_PM" = "yarn" ]; then
          export CLI_ROOT="$(yarn global dir 2>/dev/null)/node_modules"
          CLI_VERSION=$(node -e \
            "try{process.stdout.write(require(process.env.CLI_ROOT+'/@angular/cli/package.json').version)}catch(e){process.stdout.write('unknown')}" \
            2>/dev/null || echo "unknown")
        else
          export CLI_ROOT=$(npm root -g 2>/dev/null || echo "")
          CLI_VERSION=$(node -e \
            "try{process.stdout.write(require(process.env.CLI_ROOT+'/@angular/cli/package.json').version)}catch(e){process.stdout.write('unknown')}" \
            2>/dev/null || echo "unknown")
        fi
        echo "cli-version=${CLI_VERSION:-unknown}" >> "$GITHUB_OUTPUT"
