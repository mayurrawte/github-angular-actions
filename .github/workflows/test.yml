name: Test Action

on:
  push:
    branches: [master, main, 'feat/**', 'fix/**']
  pull_request:
    branches: [master, main]

jobs:
  # ── npm ──────────────────────────────────────────────────────────────────
  test-npm:
    name: Test — npm (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Run action with npm
        id: setup
        uses: ./
        with:
          version: 'latest'
          node-version: '22'
          package-manager: 'npm'

      - name: Verify CLI version output is set
        shell: bash
        run: |
          echo "CLI version: ${{ steps.setup.outputs.cli-version }}"
          if [ "${{ steps.setup.outputs.cli-version }}" = "unknown" ]; then
            echo "ERROR: cli-version output was 'unknown'"
            exit 1
          fi

      - name: Verify ng is on PATH
        shell: bash
        run: ng version

  # ── pnpm ─────────────────────────────────────────────────────────────────
  test-pnpm:
    name: Test — pnpm (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Run action with pnpm
        id: setup
        uses: ./
        with:
          version: 'latest'
          node-version: '22'
          package-manager: 'pnpm'
          # Lock file is in test-fixtures to avoid Angular CLI auto-detecting pnpm in npm/yarn jobs
          cache-dependency-path: '.github/test-fixtures/pnpm-lock.yaml'

      - name: Verify CLI version output is set
        shell: bash
        run: |
          echo "CLI version: ${{ steps.setup.outputs.cli-version }}"
          if [ "${{ steps.setup.outputs.cli-version }}" = "unknown" ]; then
            echo "ERROR: cli-version output was 'unknown'"
            exit 1
          fi

      - name: Verify ng is on PATH
        shell: bash
        run: ng version

  # ── yarn ─────────────────────────────────────────────────────────────────
  test-yarn:
    name: Test — yarn (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Run action with yarn
        id: setup
        uses: ./
        with:
          version: 'latest'
          node-version: '22'
          package-manager: 'yarn'
          cache-dependency-path: '.github/test-fixtures/yarn.lock'

      - name: Verify CLI version output is set
        shell: bash
        run: |
          echo "CLI version: ${{ steps.setup.outputs.cli-version }}"
          if [ "${{ steps.setup.outputs.cli-version }}" = "unknown" ]; then
            echo "ERROR: cli-version output was 'unknown'"
            exit 1
          fi

      - name: Verify ng is on PATH
        shell: bash
        run: ng version

  # ── pinned version ────────────────────────────────────────────────────────
  test-pinned-version:
    name: Test — pinned Angular CLI version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run action with pinned Angular CLI version
        id: setup
        uses: ./
        with:
          version: '17.3.8'
          node-version: '20'
          package-manager: 'npm'

      - name: Verify the correct version was installed
        shell: bash
        run: |
          INSTALLED="${{ steps.setup.outputs.cli-version }}"
          echo "Installed: $INSTALLED"
          if [ "$INSTALLED" != "17.3.8" ]; then
            echo "ERROR: expected 17.3.8, got $INSTALLED"
            exit 1
          fi

  # ── Node version matrix ───────────────────────────────────────────────────
  # Angular CLI latest requires Node >=20.19 or >=22.12.
  # Node 18 is tested with Angular 17.3.8 (last version supporting Node 18).
  test-node-versions:
    name: Test — Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - node: '18'
            cli-version: '17.3.8'
          - node: '20'
            cli-version: 'latest'
          - node: '22'
            cli-version: 'latest'
    steps:
      - uses: actions/checkout@v4

      - name: Run action with Node ${{ matrix.node }}
        id: setup
        uses: ./
        with:
          version: ${{ matrix.cli-version }}
          node-version: ${{ matrix.node }}
          package-manager: 'npm'

      - name: Verify node version
        shell: bash
        run: |
          NODE_VER=$(node --version)
          echo "Node version: $NODE_VER"
          if [[ "$NODE_VER" != v${{ matrix.node }}* ]]; then
            echo "ERROR: expected Node ${{ matrix.node }}, got $NODE_VER"
            exit 1
          fi

      - name: Verify ng is on PATH
        shell: bash
        run: ng version
